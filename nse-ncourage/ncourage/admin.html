<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/custom.css">
</head>

<body class="login">
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <a class="navbar-brand" href="#">
            <img src="images/encourage.png" alt="Your Logo" width="100" class="header-logo">
        </a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item">
                    <a class="nav-link" href="#">About Us</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">FAQ</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Contact Us</a>
                </li>
            </ul>
        </div>
    </nav>
    <div class="container mt-5">
        <div class="container">
            <h1>ADMIN Portal</h1>
            <hr>
            <div class="row">
                <nav class="col-md-3 col-lg-2 d-md-block sidebar vertical-tabs">
                    <ul class="nav flex-column custom_nav">
                        <li class="nav-item">
                            <a class="nav-link active" data-bs-toggle="tab" href="#tab1">Employee</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" data-bs-toggle="tab" href="#tab2">Categories</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" data-bs-toggle="tab" href="#tab3">Badges</a>
                        </li>
                    </ul>
                </nav>

                <div class="col-md-10">
                    <div class="tab-content">
                        <div id="tab1" class="tab-pane fade show active">
                            <div class="container">
                                <div class="table-wrapper">
                                    <div class="table-title">
                                        <div class="row">
                                            <div class="col-sm-8">
                                                <h2>Employee <b>Details</b></h2>
                                            </div>
                                            <div class="col-sm-4">
                                                <button type="button" class="btn btn-info add-new">
                                                    <i class="fa-solid fa-trash"></i> Add New
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                    <table id="apiDataTable"
                                        class="employee_table table table-striped table-bordered text-center">
                                        <thead>
                                            <tr>
                                                <th width="5%">ID</th>
                                                <th>Name</th>
                                                <th width="20%">Total Earned Points</th>
                                                <th width="20%">Badges</th>
                                                <th>Action</th>
                                            </tr>
                                        </thead>
                                        <tbody id="apiDataBody"></tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                        <div id="tab2" class="tab-pane fade">
                            Content for Tab 2 goes here.
                        </div>
                        <div id="tab3" class="tab-pane fade">
                            Content for Tab 3 goes here.
                        </div>
                    </div>



                </div>
            </div>
        </div>

    </div>

    <!-- Modal Section start here -->
    <div class="modal fade" id="editEmployeeModal" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel"
        aria-hidden="true">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="exampleModalLabel">Edit Employee</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <!-- Employee details form -->
                    <form id="editEmployeeForm">
                        <div class="form-group">
                            <label for="editEmpId">Employee ID</label>
                            <input type="text" class="form-control" id="editID" name="empName">
                        </div>
                        <div class="form-group">
                            <label for="editEmpName">Employee Name</label>
                            <input type="text" class="form-control" id="editEmpName" name="empName">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" id="saveEmployee">Save</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Success Modal -->
    <!-- Success Modal -->
    <div class="modal fade" id="successModal" tabindex="-1" role="dialog" aria-labelledby="successModalLabel"
        aria-hidden="true">
        <div class="modal-dialog" role="document">
            <div class="modal-content success-modal">
                <div class="modal-header">
                    <h5 class="modal-title" id="successModalLabel">Success</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <p id="successModalMessage">Data saved successfully.</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" data-dismiss="modal">OK</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.min.js"></script>
    <script src="js/admin.js"></script>
</body>

</html>
